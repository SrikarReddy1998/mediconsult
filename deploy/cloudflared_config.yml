# cloudflared config for MediConsult remote MCP + caretaker upload.
#
# This exposes ONLY the MCP server and the upload page to the internet,
# with NO open ports on the host. Cloudflare Access (configured in the
# Cloudflare dashboard) sits in front and requires authentication before
# any request reaches the machine.
#
# Setup:
#   1. Install cloudflared on the host (laptop or Oracle Cloud ARM VM)
#   2. cloudflared tunnel login
#   3. cloudflared tunnel create mediconsult
#   4. Put the tunnel UUID below and point your domain's DNS at it:
#        cloudflared tunnel route dns mediconsult mcp.yourdomain.com
#        cloudflared tunnel route dns mediconsult upload.yourdomain.com
#   5. In the Cloudflare dashboard → Zero Trust → Access → Applications:
#        add an Access policy for both hostnames (email OTP or your identity)
#   6. cloudflared tunnel run mediconsult

tunnel: <YOUR_TUNNEL_UUID>
credentials-file: /home/youruser/.cloudflared/<YOUR_TUNNEL_UUID>.json

ingress:
  # The remote MCP server (Claude mobile connects here)
  - hostname: mcp.yourdomain.com
    service: http://localhost:8765

  # The caretaker upload page (family members submit here)
  - hostname: upload.yourdomain.com
    service: http://localhost:8766

  # Catch-all (required last rule)
  - service: http_status:404
